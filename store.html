<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image.png" href="images/icon.png">
    <title>Store</title>
</head>
<body>
    <div class="layout">
        <header>
            <a href="index.html"><img src="images/logo.png" class="logo"></a>
            <nav>
                <a href="index.html">Home</a>
                <a href="store.html">Shop</a>
            </nav>
        </header>
        <main>
            <div class="search">
                <div class="search-area">
                    <input type="search" placeholder="Search" class="search-bar" id="search-bar" style="display: block;">
                    <button name="search-btn" class="search-btn"><img src="images/loupe.png"></button>
                </div>
                <div class="filter">
                    <select id="filter" class="filter-select">
                        <option value="all">All</option>
                        <option value="tops">Tops</option>
                        <option value="pants">Pants</option>
                        <option value="skirts">Skirts</option>
                        <option value="accessories">Accessories</option>
                        <option value="shoes">Shoes</option>
                    </select>
                </div>
                <script src="search.js"></script>
                <script src="script.js"></script>
            </div>
            <div class="product_grid">
                <!-- Product items will be dynamically inserted here -->
            </div>
        </main>
        <footer>
            <p>123 Street Name, City, Country<br>+123-456-7890</p>
            <p>© 2023 Wardrobe. All rights reserved.</p>
        </footer>
    </div>
</body>
</html>
